name: Build DLL
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Compile DLL
      run: cl.exe /LD main.cpp /Fe:changer.dll user32.lib
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-compiled-dll
        path: changer.dll
